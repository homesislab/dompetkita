services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dompetkita-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - dompetkita-network

  nginx:
    image: nginx:alpine
    container_name: dompetkita-nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dompetkita-network

networks:
  dompetkita-network:
    driver: bridge
