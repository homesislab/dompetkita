services:
  # Backend API (Laravel)
  api:
    build:
      context: ./dompetkita-api
      dockerfile: Dockerfile
    container_name: dompetkita-api
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./dompetkita-api:/var/www
    networks:
      - dompetkita-network
      - shared_apps

  # Nginx for Backend
  api-nginx:
    image: nginx:alpine
    container_name: dompetkita-api-nginx
    restart: unless-stopped
    ports:
      - "8004:80"
    volumes:
      - ./dompetkita-api:/var/www
      - ./dompetkita-api/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dompetkita-network
      - shared_apps
    depends_on:
      - api

  # Frontend Web (Vite)
  web:
    build:
      context: ./dompetkita-web
      dockerfile: Dockerfile
    container_name: dompetkita-web
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./dompetkita-web/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dompetkita-network
      - shared_apps
    depends_on:
      - api-nginx

networks:
  dompetkita-network:
    driver: bridge
  shared_apps:
    external: true
